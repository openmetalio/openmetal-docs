paths:
  /v1/oauth2/token:
    get:
      tags:
        - OAuth 2.0
      summary: Get Token
      description: |
        Exchange OAuth Application client credentials for a short-lived Bearer token.
        
        This endpoint uses **Basic Authentication** with your OAuth App credentials:
        - Username: `client_id`
        - Password: `client_secret`
        
        The Authorization header should contain the Base64-encoded credentials in the format:
        ```
        Authorization: Basic <Base64(client_id:client_secret)>
        ```
        
        Example cURL request:
        ```bash
        curl --location 'https://api.central.openmetal.io/v1/oauth2/token?grant_type=client_credentials' \
          --header 'Authorization: Basic <Base64-encoded-credentials>'
        ```
      parameters:
        - name: grant_type
          in: query
          required: true
          description: The OAuth grant type. Currently only "client_credentials" is supported.
          schema:
            type: string
            enum: ["client_credentials"]
            example: "client_credentials"
      security:
        - basicAuth: []
      responses:
        '200':
          description: Token generated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: The short-lived Bearer token to use for API authentication
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  scope:
                    type: string
                    description: The scope of the token
                    example: "https://api.central.openmetal.io/v1/*"
                  expires_in:
                    type: integer
                    description: Token lifetime in seconds
                    example: 14400
                  token_type:
                    type: string
                    description: The type of token returned
                    example: "bearer"
                required:
                  - access_token
                  - scope
                  - expires_in
                  - token_type
        '400':
          description: Invalid grant type or malformed request
        '401':
          description: Invalid client credentials
  /v1/clouds:
    get:
      tags:
        - Clouds
      summary: Get a list of clouds
      description: Retrieve a list of of your clouds.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cloud'
  /v1/clouds/{cloudId}:
    get:
      tags:
        - Clouds
      summary: Get a cloud by ID
      description: Retrieve details of a specific cloud by their ID.
      parameters:
        - name: cloudId
          in: path
          required: true
          description: The ID of the cloud to retrieve.
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cloud found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cloud'
        '404':
          description: Cloud not found.
    delete:
      tags:
        - Clouds
      summary: Delete a cloud
      description: |
        Delete a cloud resource and reclaim all associated infrastructure.

        **Important:** The cloud will be immediately deactivated upon successful deletion. However, there is a 3-day delay before servers are fully decommissioned and wiped. Clouds will enter a "pending-delete" state during this period.
      parameters:
        - name: cloudId
          in: path
          required: true
          description: The ID of the cloud to delete.
          schema:
            type: string
            example: "0Absd1"
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cloud deleted successfully.
        '401':
          description: Unauthorized - Invalid or missing Bearer token.
        '403':
          description: Forbidden - User lacks manage permissions or the cloud is in a locked state.
        '404':
          description: Cloud not found.
  /v1/clouds/{cloudId}/stats:
    get:
      tags:
        - Clouds
      summary: Get cloud stats
      description: |
        Get detailed stats for a specific cloud including node hardware information, power states, VLAN configuration, and service assignments.
      parameters:
        - name: cloudId
          in: path
          required: true
          description: The ID of the cloud to retrieve.
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cloud stats retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudStats'
        '404':
          description: Cloud not found.

  /v1/clouds/{cloudId}/vlans/{vlanId}:
    post:
      tags:
        - Clouds
      summary: Assign a VLAN to a cloud
      description: |
        Assign an existing VLAN resource to a private cloud.

        **Requirements:**
        - Both the cloud and VLAN must be in the same datacenter location
        - Both resources must be owned by the same organization
        - The cloud provisioning status must be "complete"
        - Clouds can have a maximum of 10 assigned VLANs
      parameters:
        - name: cloudId
          in: path
          required: true
          description: The ID of the cloud to assign the VLAN to.
          schema:
            type: string
            example: "0Absd1"
        - name: vlanId
          in: path
          required: true
          description: The ID of the VLAN resource to assign.
          schema:
            type: string
            example: "vl4nXy2Z9a"
      security:
        - bearerAuth: []
      responses:
        '200':
          description: VLAN assigned to cloud successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VlanResource'
        '400':
          description: Bad Request - Invalid assignment (location mismatch, cloud not ready, max VLANs reached, etc.).
        '401':
          description: Unauthorized - Invalid or missing Bearer token.
        '403':
          description: Forbidden - User lacks write permissions for cloud or VLAN.
        '404':
          description: Cloud or VLAN not found.
    delete:
      tags:
        - Clouds
      summary: Unassign a VLAN from a cloud
      description: |
        Unassign a VLAN resource from a private cloud.

        This removes the association between the VLAN and the cloud but does not delete the VLAN resource itself.

        **Important:** You cannot remove all VLAN assignments. A VLAN needs to have at least one cloud assignment.
      parameters:
        - name: cloudId
          in: path
          required: true
          description: The ID of the cloud to unassign the VLAN from.
          schema:
            type: string
            example: "0Absd1"
        - name: vlanId
          in: path
          required: true
          description: The ID of the VLAN resource to unassign.
          schema:
            type: string
            example: "vl4nXy2Z9a"
      security:
        - bearerAuth: []
      responses:
        '200':
          description: VLAN unassigned from cloud successfully.
        '401':
          description: Unauthorized - Invalid or missing Bearer token.
        '403':
          description: Forbidden - User lacks write permissions for cloud or VLAN.
        '404':
          description: Cloud or VLAN not found.

  /v1/deployment/cloud/{cloudId}/node/{nodeUuid}/power:
    post:
      tags:
        - Nodes
      summary: Change the power state of the node.
      description: Change power state. Options are "power on", "power off", or "rebooting".
      parameters:
        - name: cloudId
          in: path
          required: true
          description: The ID of the cloud that owns the node.
          schema:
            type: string
        - name: nodeUuid
          in: path
          required: true
          description: The UUID of the node to change the power state. This UUID can be found in the cloud hardware information.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                power_state:
                  type: string
                  description: The new power state of the node. Options are "power on", "power off", or "rebooting".
                  example: "power on"
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Power state changed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    description: The result of the power state change
                    example: "success"
                  power_state:
                    type: string
                    description: The requested new power state of the node.
                    example: "power on"
                  node_uuid:
                    type: string
                    description: The UUID of the node.
                    example: "0000000-0000-00-00000"
        '400':
          description: Invalid power state request
        '409':
          description: Unable to process power state request - Node Locked.  Please try again in a few minutes.
        '500':
          description: Unable to update power state

  /v1/orders:
    get:
      tags:
        - Orders
      summary: Get a list of orders
      description: Retrieve a list of all orders that have been created by you or organizations that you are a member of.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of orders.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderCollection'
    post:
      tags:
        - Orders
      summary: Create a new order
      description: |
        Create a new order for baremetal servers or private cloud products running OpenStack.

        ## Deploying a New Cloud

        By default, when no `cloud_id` is specified on an order item, a new cloud will be deployed with the ordered hardware.

        ## Adding Nodes to an Existing Cloud

        To add hardware nodes to an existing cloud, include the `cloud_id` field in the item configuration. The new node will be provisioned and added to the specified cloud's infrastructure, with billing attached to the existing cloud.

        - The `cloud_id` must reference a cloud owned by your organization
        - The `location` must match the cloud's datacenter location
        - The `type` must match the cloud's type (`baremetal` or `pcc`)
        - The cloud must be fully provisioned (`provision_status: "complete"`) before nodes can be added
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
            examples:
              baremetal_order:
                summary: Baremetal order with Operating System specified.
                description: A baremetal order with Operating System specified.
                value:
                  label: "Baremetal Medium V4 with Ubuntu 22.04 LTS"
                  description: "Baremetal Medium V4 cluster in Ashburn, VA with 1 node to run production workloads."
                  fields:
                    items:
                      - hardware_sku: "medium_v4"
                        location: "pod_1"
                        type: "baremetal"
                        quantity: 1
                        modifications:
                          operating_system:
                            os_key: "Ubuntu"
                            version_key: "22.04 LTS"
                    config_options:
                      public_key: "ssh-rsa AAAA..."
              baremetal_order_with_deployment_configuration:
                summary: Baremetal order with custom deployment configuration.
                description: A baremetal order with a custom deployment configuration specified.
                value:
                  label: "Baremetal Medium V4 with custom deployment configuration"
                  description: "Baremetal Medium V4 cluster in Ashburn, VA with 1 node to run production workloads."
                  fields:
                    items:
                      - hardware_sku: "medium_v4"
                        location: "pod_1"
                        type: "baremetal"
                        quantity: 1
                        modifications:
                          deployment_configuration: "0a7Y8ABym5"
                    config_options:
                      public_key: "ssh-rsa AAAA..."
              baremetal_order_with_ssh_key_ids:
                summary: Baremetal order using saved SSH key references.
                description: A baremetal order that references existing SSH public key resources by ID instead of providing raw key data.
                value:
                  label: "Baremetal Medium V4 with saved SSH keys"
                  description: "Baremetal Medium V4 cluster in Ashburn, VA with saved SSH keys."
                  fields:
                    items:
                      - hardware_sku: "medium_v4"
                        location: "pod_1"
                        type: "baremetal"
                        quantity: 1
                        modifications:
                          operating_system:
                            os_key: "Ubuntu"
                            version_key: "22.04 LTS"
                    config_options:
                      public_key_ids: ["OvZyEGQwWj", "Kp3mNxRtYq"]
              pcc_order:
                summary: OpenStack PCC order.
                description: A PCC order running OpenStack.
                value:
                  label: "PCC Medium V4 Order"
                  description: "A 3 node PCC cluster in Ashburn, VA running OpenStack."
                  fields:
                    items:
                      - hardware_sku: "medium_v4"
                        location: "pod_1"
                        type: "pcc"
                        quantity: 1
              add_baremetal_node_to_cloud:
                summary: Add a baremetal node to an existing cloud.
                description: Add a new baremetal node to an existing baremetal cloud by specifying the cloud_id. The node will be provisioned and added to the cloud's infrastructure.
                value:
                  label: "Add Baremetal Node to Cloud"
                  description: "Add 1 medium_v4 baremetal node to an existing cloud."
                  fields:
                    items:
                      - hardware_sku: "medium_v4"
                        location: "pod_1"
                        type: "baremetal"
                        quantity: 1
                        cloud_id: "0Absd1"
                        modifications:
                          operating_system:
                            os_key: "Ubuntu"
                            version_key: "22.04 LTS"
                    config_options:
                      public_key: "ssh-rsa AAAA..."
              add_pcc_node_to_cloud:
                summary: Add a node to an existing PCC cloud.
                description: Add a new node to an existing PCC (Private Cloud Core) cloud by specifying the cloud_id. The node will be provisioned and integrated into the OpenStack cluster.
                value:
                  label: "Add PCC Node to Cloud"
                  description: "Add 1 medium_v4 node to an existing PCC cloud."
                  fields:
                    items:
                      - hardware_sku: "medium_v4"
                        location: "pod_1"
                        type: "pcc"
                        quantity: 1
                        cloud_id: "0Absd1"
      responses:
        '200':
          description: Order created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOrder'
        '400':
          description: Invalid request payload
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /v1/orders/{orderId}:
    get:
      tags:
        - Orders
      summary: Get an order by ID
      description: Retrieve a specific order by its ID to view details and check the status of the order.
      parameters:
        - name: orderId
          in: path
          required: true
          description: The ID of the order to retrieve.
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Order found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOrder'
        '404':
          description: Order not found.

  /v2/inventory/locations:
    get:
      tags:
        - Inventory
      summary: Get available locations
      description: Retrieve a list of available datacenter locations and their details.
      responses:
        '200':
          description: List of locations retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Locations'

  /v2/inventory/{pod_location}/availability:
    get:
      tags:
        - Inventory
      summary: Get inventory availability for a specific pod location
      description: Retrieve current inventory availability information for a specific datacenter location. This endpoint shows available hardware SKUs and their counts.
      parameters:
        - name: pod_location
          in: path
          required: true
          description: The unique datacenter identifier (e.g., "pod_1", "pod_2", etc.).  Available locations can be retrieved from the [inventory locations endpoint](#tag/Inventory/paths/~1v2~1inventory~1locations/get).
          schema:
            type: string
            example: "pod_1"
      responses:
        '200':
          description: Inventory availability retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryAvailability'
        '400':
          description: Invalid pod location.

  # Deployment Configuration Endpoints
  /v1/configurations:
    get:
      tags:
        - Configurations
      summary: List configurations
      description: Retrieve a list of all custom deployment configurations for your organization.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of deployment configurations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImageConfiguration'
        '401':
          description: Unauthorized - Invalid or missing Bearer token.
        '403':
          description: Forbidden - User lacks read permissions.
    post:
      tags:
        - Configurations
      summary: Create a configuration
      description: |
        Create a new custom deployment configuration with an OS image and/or cloud-init user data.

        ## Deployment Mode

        Set `image_source` in the `fields` object to a whole-disk image URL for disk deployment.

        ## Validation Requirements

        - `image_os_hash_algo` and `image_os_hash_value` are **required** when `image_source` is set
        - `image_os_hash_algo` must be one of: `md5`, `sha256`, `sha512`
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageConfigRequest'
            examples:
              disk_deployment:
                summary: Disk deployment (image_source)
                description: Deploy a whole-disk OS image directly to the node's disk. This is the most common deployment mode.
                value:
                  label: "Ubuntu 22.04 Disk Deploy"
                  description: "Standard whole-disk image deployment"
                  fields:
                    image_source: "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
                    image_os_hash_algo: "sha256"
                    image_os_hash_value: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
              # Ramdisk examples temporarily disabled — ramdisk deployments are not currently available.
              # ramdisk_kernel:
              #   summary: Ramdisk deployment (kernel + initramfs)
              #   description: Boot an OS into memory using a kernel and initramfs pair. The OS runs entirely in RAM — no disk writes occur. Hash fields are not required for ramdisk deployments.
              #   value:
              #     label: "CoreOS Ramdisk Deploy"
              #     description: "Ramdisk deployment using kernel and initramfs"
              #     fields:
              #       image_ramdisk_kernel: "https://images.example.com/coreos/vmlinuz"
              #       image_ramdisk_ramdisk: "https://images.example.com/coreos/initramfs.img"
              # ramdisk_boot_iso:
              #   summary: Ramdisk deployment (boot ISO)
              #   description: Boot from an ISO image loaded into memory. Useful for rescue environments or live OS images. Hash fields are not required for ramdisk deployments.
              #   value:
              #     label: "Rescue ISO Boot"
              #     description: "Boot from ISO loaded into ramdisk"
              #     fields:
              #       image_ramdisk_boot_iso: "https://images.example.com/rescue/systemrescue-11.01-amd64.iso"
              disk_with_cloud_init:
                summary: Disk deployment with cloud-init
                description: A disk deployment with cloud-init user data for automated post-provisioning setup.
                value:
                  label: "Ubuntu 22.04 with Cloud Init"
                  description: "Disk deploy with cloud-init for automated setup"
                  fields:
                    image_source: "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
                    image_os_hash_algo: "sha256"
                    image_os_hash_value: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
                    cloud_init:
                      data: "{\"write_files\":[{\"content\":\"#!/bin/bash\\necho 'hello world!'\\n\",\"path\":\"/var/lib/cloud/scripts/per-once/setup.sh\"}],\"runcmd\":[\"/var/lib/cloud/scripts/per-once/setup.sh\"],\"packages\":[\"nginx\",\"docker.io\"]}"
      responses:
        '200':
          description: Configuration created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageConfiguration'
        '400':
          description: |
            Invalid deployment configuration. Possible validation errors:
            - Ramdisk fields specified (`image_ramdisk_kernel`, `image_ramdisk_ramdisk`, `image_ramdisk_boot_iso`) — ramdisk deployments are not currently available
            - Missing `image_os_hash_algo` or `image_os_hash_value` when `image_source` is specified
            - Invalid `image_os_hash_algo` value
        '401':
          description: Unauthorized - Invalid or missing Bearer token.
        '403':
          description: Forbidden - User lacks write permissions.

  /v1/configurations/{configurationId}:
    get:
      tags:
        - Configurations
      summary: Get a configuration by ID
      description: Retrieve details of a specific deployment configuration by its ID.
      parameters:
        - name: configurationId
          in: path
          required: true
          description: The ID of the deployment configuration to retrieve.
          schema:
            type: string
            example: "0a7Y8ABym5"
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Configuration found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageConfiguration'
        '401':
          description: Unauthorized - Invalid or missing Bearer token.
        '403':
          description: Forbidden - User lacks read permissions.
        '404':
          description: Configuration not found.
    patch:
      tags:
        - Configurations
      summary: Update a configuration
      description: |
        Update an existing deployment configuration. The configuration ID must be included in the request body.

        Only include the fields you want to change — the server merges incoming fields with existing fields before re-validating. This means you can update a single field (e.g., change `image_source`) without resending the entire configuration.
      parameters:
        - name: configurationId
          in: path
          required: true
          description: The ID of the deployment configuration to update.
          schema:
            type: string
            example: "0a7Y8ABym5"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateImageConfigRequest'
            examples:
              update_image_url:
                summary: Update the image source URL
                description: Change the disk image URL on an existing disk deployment configuration. Hash fields and other settings are preserved.
                value:
                  id: "0a7Y8ABym5"
                  fields:
                    image_source: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
                    image_os_hash_value: "f1d2d2f924e986ac86fdf7b36c94bcdf32beec15f1d2d2f924e986ac86fdf7b3"
              add_cloud_init:
                summary: Add cloud-init to existing configuration
                description: Add cloud-init user data to an existing deployment configuration without changing the image settings.
                value:
                  id: "0a7Y8ABym5"
                  fields:
                    cloud_init:
                      data: "{\"packages\":[\"htop\",\"tmux\"]}"
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Configuration updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageConfiguration'
        '400':
          description: Invalid deployment configuration after merging with existing fields.
        '401':
          description: Unauthorized - Invalid or missing Bearer token.
        '403':
          description: Forbidden - User lacks write permissions.
        '404':
          description: Configuration not found.
    delete:
      tags:
        - Configurations
      summary: Delete a configuration
      description: Delete a deployment configuration.
      parameters:
        - name: configurationId
          in: path
          required: true
          description: The ID of the deployment configuration to delete.
          schema:
            type: string
            example: "0a7Y8ABym5"
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Configuration deleted successfully. No content returned.
        '401':
          description: Unauthorized - Invalid or missing Bearer token.
        '403':
          description: Forbidden - User lacks write permissions.
        '404':
          description: Configuration not found.

  /v1/deployment/node/images/{pod_location}:
