  # SSH Public Key Endpoints
  /v1/public-keys:
    get:
      tags:
        - SSH Keys
      summary: List public keys
      description: |
        Retrieve a list of all active SSH public keys the authenticated user has access to (owned, shared via team, or organization).

        Returns an empty array `[]` when the user has no public keys.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of public key resources.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicKeyCollection'
    post:
      tags:
        - SSH Keys
      summary: Create a public key
      description: |
        Create a new SSH public key resource.

        The key is validated on creation and a SHA256 fingerprint is automatically computed from the key data. The fingerprint cannot be set directly.

        **Supported key types:** ssh-rsa, ssh-dss, ssh-ed25519, ecdsa-sha2-nistp256, ecdsa-sha2-nistp384, ecdsa-sha2-nistp521, sk-ssh-ed25519@openssh.com, sk-ecdsa-sha2-nistp256@openssh.com
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePublicKeyRequest'
            examples:
              ed25519_key:
                summary: ED25519 key
                description: Create a public key with an ED25519 SSH key.
                value:
                  label: "My SSH Key"
                  description: "Work laptop key"
                  fields:
                    key_data: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGtTMYFhxSBKt5do8C2ynGRTcQFMHOJ/BFVsFmVBcSdn user@workstation"
              rsa_key:
                summary: RSA key
                description: Create a public key with an RSA SSH key.
                value:
                  label: "RSA Deploy Key"
                  fields:
                    key_data: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABgQC7... user@host"
      responses:
        '200':
          description: Public key created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicKey'
        '400':
          description: |
            Bad Request. Possible causes:
            - Missing required field (`label` or `fields.key_data`)
            - Invalid SSH public key format
            - Unsupported SSH key type
            - Invalid base64 key data
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PublicKeyErrorResponse'
                  - $ref: '#/components/schemas/PublicKeyValidationError'

  /v1/public-keys/{publicKeyId}:
    get:
      tags:
        - SSH Keys
      summary: Get a public key
      description: |
        Retrieve details of a specific SSH public key by its ID.
      parameters:
        - name: publicKeyId
          in: path
          required: true
          description: The hashed resource ID of the public key.
          schema:
            type: string
            example: "OvZyEGQwWj"
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Public key found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicKeyWithAccess'
    patch:
      tags:
        - SSH Keys
      summary: Update a public key
      description: |
        Update an existing SSH public key. All fields are optional — only provided fields are changed.

        When `key_data` is updated, the `fingerprint` is automatically recomputed. The `fingerprint` field cannot be set directly.
      parameters:
        - name: publicKeyId
          in: path
          required: true
          description: The hashed resource ID of the public key to update.
          schema:
            type: string
            example: "OvZyEGQwWj"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePublicKeyRequest'
            examples:
              update_label:
                summary: Update label only
                description: Update just the display name of the key.
                value:
                  label: "My Updated SSH Key"
              update_key_data:
                summary: Update key data
                description: Replace the SSH key data (fingerprint is automatically recomputed).
                value:
                  fields:
                    key_data: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABgQC7... updated@example.com"
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Public key updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicKeyWithAccess'
        '400':
          description: |
            Bad Request. When `key_data` is provided, the same validation errors as create apply:
            - Invalid SSH public key format
            - Unsupported SSH key type
            - Invalid base64 key data
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PublicKeyErrorResponse'
                  - $ref: '#/components/schemas/PublicKeyValidationError'
    delete:
      tags:
        - SSH Keys
      summary: Delete a public key
      description: |
        Delete an SSH public key. This performs a soft delete (sets `is_active` to `false`).
      parameters:
        - name: publicKeyId
          in: path
          required: true
          description: The hashed resource ID of the public key to delete.
          schema:
            type: string
            example: "OvZyEGQwWj"
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Public key deleted successfully. No content returned.

