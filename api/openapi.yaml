tags:
  - name: OAuth 2.0
    description: Operations for OAuth 2.0 client credential flow and token management.
  - name: API Keys
    description: Long-term API keys for persistent authentication.
  - name: Clouds
    description: Operations for managing a collection of servers. Private clouds or a group of baremetal nodes will be owned by a cloud resource.
  - name: Deployment
    description: Operations for deployment and provisioning related resources such as node images.
  - name: Configurations
    description: |
      Operations for managing custom deployment configurations.

      A **configuration** is a reusable template that defines what operating system image and/or cloud-init user data should be applied to bare metal hardware during provisioning. Instead of specifying an OS image directly in each order, you can create a configuration once and reference it by ID when placing bare metal orders via the `deployment_configuration` field in order modifications.

      ## Deployment Modes

      Configurations currently support disk deployment mode:

      | Mode | Required Fields | Description |
      |------|----------------|-------------|
      | **Disk** | `image_source` | Traditional whole-disk image written directly to disk |
      <!-- Ramdisk deployment modes are temporarily disabled and will be re-enabled in a future release.
      | **Ramdisk (kernel)** | `image_ramdisk_kernel` + `image_ramdisk_ramdisk` | OS loaded into memory via kernel and initramfs |
      | **Ramdisk (ISO)** | `image_ramdisk_boot_iso` | OS loaded into memory from a boot ISO |
      -->

      Disk mode requires `image_os_hash_algo` and `image_os_hash_value` for image integrity verification. Valid hash algorithms are `md5`, `sha256`, and `sha512`.
      <!-- These fields are not required for ramdisk deployments. -->

      Cloud-init user data (`cloud_init.data`) can be combined with disk deployment.
  - name: Inventory
    description: Operations for retrieving inventory information such as available locations and availability.
  - name: Orders
    description: |
      Operations for managing orders.

      ## Creating a New Server Order

      Follow this workflow to create and track a new server order:

      1. **Check Inventory Availability** - Use the [GET /v2/inventory/{pod_location}/availability](#tag/Inventory/paths/~1v2~1inventory~1%7Bpod_location%7D~1availability/get) endpoint to verify that your desired hardware SKU is available in the target datacenter location.

      2. **Create the Order** - Submit a [POST /v1/orders](#tag/Orders/paths/~1v1~1orders/post) request with your desired configuration (hardware SKU, location, type, and quantity).

      3. **Monitor Order Status** - Use [GET /v1/orders/{orderId}](#tag/Orders/paths/~1v1~1orders~1%7BorderId%7D/get) to retrieve the order and check the `clouds_deployed` field. Each item in the `clouds_deployed` array contains:
         - `id` - The cloud resource identifier
         - `provisioning_status` - Current provisioning state with progression: `pending` → `in_progress` → `awaiting_setup` → `complete`
         - If errors occur during provisioning, the cloud may enter a `manual_setup` state requiring support intervention

      4. **Query Cloud Details** - Once you have the cloud ID from `clouds_deployed[].id`, use the [GET /v1/clouds/{cloudId}](#tag/Clouds/paths/~1v1~1clouds~1%7BcloudId%7D/get) endpoint to retrieve detailed information about the provisioned cloud, including its `provision_status` and other configuration details.
  - name: Nodes
    description: Operations for managing and interacting with individual nodes that are assigned to a cloud, including IPMI console access and power management.
  - name: VLANs
    description: Operations for managing Virtual LAN (VLAN) resources for private clouds.
  - name: IP Blocks
    description: Operations for managing IP Address Block (Prefix) resources for private clouds.
  - name: SSH Keys
    description: |
      Operations for managing SSH public keys.

      SSH public keys can be stored and managed for use during bare metal provisioning. Keys are validated on create/update and a SHA256 fingerprint is automatically computed from the key data.

      Supported key types: ssh-rsa, ssh-dss, ssh-ed25519, ecdsa-sha2-nistp256, ecdsa-sha2-nistp384, ecdsa-sha2-nistp521, sk-ssh-ed25519@openssh.com, sk-ecdsa-sha2-nistp256@openssh.com
  - name: Accounts
    description: Operations for retrieving account and organization profile information.
  - name: Organizations
    description: Operations for creating organizations and managing their members.
  - name: Node Metadata
    description: |
      An OpenStack-compatible metadata service at `http://169.254.169.254` that serves cloud-init configuration to bare metal nodes over HTTP.

      ## Overview

      Nodes deployed with a ramdisk (kernel + initramfs) deployment configuration receive their cloud-init data from this service. It provides instance metadata, network configuration, and user data so the OS can configure itself after booting into memory.

      The service is accessible only from the node itself at the link-local address `169.254.169.254`. It is not routable from the public internet. No authentication is required — node identity is determined by the source IP of the request.

      ## Ramdisk Image Requirements

      cloud-init cannot auto-detect standalone bare metal as an OpenStack platform. Your ramdisk image must force the OpenStack datasource by including the following configuration at `/etc/cloud/cloud.cfg.d/99-datasource.cfg`:

      ```yaml
      datasource_list: [OpenStack]
      datasource:
        OpenStack:
          metadata_urls: ["http://169.254.169.254"]
          max_wait: 120
          timeout: 10
          retries: 5
          apply_network_config: true
      resize_rootfs: false
      system_info:
        network:
          renderers: ["networkd"]
      ```

      ### Key Settings

      | Setting | Required | Description |
      |---------|----------|-------------|
      | `datasource_list: [OpenStack]` | Yes | Forces the OpenStack datasource. DMI-based auto-detection does not work on bare metal. |
      | `max_wait: 120` | Yes | Default is `-1` (single probe). Set to 120 to give cloud-init time to retry if the service is not immediately reachable. |
      | `apply_network_config: true` | Recommended | Tells cloud-init to configure networking from `network_data.json`. |
      | `renderers: ['networkd']` | Recommended | Renders network config as systemd-networkd files, avoiding a netplan dependency. |
      | `resize_rootfs: false` | Recommended | The ramdisk runs on tmpfs; there is no block device to resize. |

